[plugin]

name="Platfomer_StarterKit"
description="A beginner friendly platformer starterkit aimed at reducing development time and adding basic platformer game necessities.
The following nodes can be found by searching with the names via the add node option.
-    Bounce pad
-    Item
-    Level change
-    Moving platform
-    Platform path"
author="Isaiah Essien"
version="2.0"
script="platfomer_starterkit.gd"
